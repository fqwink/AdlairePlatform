name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP Lint (syntax check)
        run: |
          find . -name '*.php' -not -path './Framework/*' -not -path './vendor/*' | \
            xargs -n1 php -l 2>&1 | grep -v 'No syntax errors' || true
          find . -name '*.php' -not -path './Framework/*' -not -path './vendor/*' | \
            xargs -n1 php -l 2>&1 | grep -q 'Parse error' && exit 1 || exit 0

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, json, gd

      - name: Run tests
        run: php tests/run.php
